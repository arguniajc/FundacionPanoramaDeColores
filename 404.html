<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Página no encontrada — Fundación Panorama de Colores</title>
  <meta name="robots" content="noindex">
  <script>
    /*
     * GitHub Pages SPA routing fix
     *
     * Con HashRouter las rutas van en el fragmento (#/...) y el servidor
     * nunca ve el path completo — los recargas ya no causan 404.
     *
     * Este 404.html solo se activa si alguien escribe manualmente una
     * URL sin # o usa un link antiguo de /panel o /gestion sin hash.
     * En ese caso redirigimos a la raíz de la plataforma.
     */
    (function () {
      var path = window.location.pathname;

      // Redirigir links de /gestion/* o /panel/* al entry point correcto
      if (path.startsWith('/gestion') || path.startsWith('/panel')) {
        window.location.replace('/gestion/');
      } else {
        // Cualquier otra ruta: ir al inicio público
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body></body>
</html>
