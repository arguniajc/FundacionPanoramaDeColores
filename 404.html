<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Fundación Panorama de Colores</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <script>
    /* Redirigir /gestion/* y /panel/* al entry point del admin */
    (function () {
      var p = window.location.pathname;
      if (p.startsWith('/gestion') || p.startsWith('/panel')) {
        window.location.replace('/gestion/');
      }
    })();
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:      #4E1B95;
      --purple-dark: #2D0A5E;
      --purple-soft: #EDE5FF;
      --green:       #2D984F;
      --green-hover: #1D7038;
      --orange:      #F59D1E;
      --cyan:        #B4E8E8;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--purple-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(78,27,149,0.6)  0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(45,152,79,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 75% 20%, rgba(245,157,30,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 35% 35% at 30% 75%, rgba(180,232,232,0.18) 0%, transparent 60%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .logo-wrap { margin-bottom: 1.75rem; }
    .logo-wrap img {
      height: 76px; width: 76px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
    }

    .brush {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 0.75rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0)    rotate(-8deg); }
      50%       { transform: translateY(-10px) rotate(8deg); }
    }

    .code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--orange) 55%, var(--purple-soft) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: rgba(255,255,255,0.95);
    }

    p {
      font-size: clamp(0.875rem, 2vw, 1rem);
      color: rgba(255,255,255,0.60);
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(45,152,79,0.40);
      transition: background 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
    }
    .btn-home:hover {
      background: var(--green-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(45,152,79,0.55);
    }

    .quick-links {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }
    .quick-links a {
      color: rgba(255,255,255,0.45);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.18s;
    }
    .quick-links a:hover { color: var(--cyan); }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="Logo Fundación Panorama de Colores">
    </div>

    <span class="brush">🎨</span>

    <div class="code">404</div>

    <h1>¡Esta página no existe!</h1>
    <p>
      Parece que la página que buscas se fue de paseo.<br>
      Pero aquí siempre hay arte, deporte y color esperándote.
    </p>

    <a href="/" class="btn-home">
      <i class="fas fa-home"></i>&nbsp; Volver al inicio
    </a>

    <nav class="quick-links" aria-label="Enlaces rápidos">
      <a href="/#quienes-somos">Quiénes somos</a>
      <a href="/#que-hacemos">Programas</a>
      <a href="/#donaciones">Cómo ayudar</a>
      <a href="/#contacto">Contacto</a>
    </nav>
  </div>
</body>
</html>
