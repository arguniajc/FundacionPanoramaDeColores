<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirigiendo…</title>
  <script>
    /*
     * GitHub Pages SPA routing fix — raíz del repo
     *
     * Cuando se recarga una URL como /gestion/sede/beneficiarios,
     * GitHub Pages no encuentra el archivo y sirve este 404.html.
     * Detectamos el primer segmento de ruta (/gestion) como base
     * y redirigimos a /gestion/?r=/sede/beneficiarios para que
     * el index.html restaure la ruta correcta en el historial.
     */
    (function () {
      var loc   = window.location;
      var parts = loc.pathname.split('/').filter(Boolean);

      if (parts.length === 0) return;

      var base = '/' + parts[0];                          // '/gestion'
      var rest = loc.pathname.slice(base.length) || '/';  // '/sede/beneficiarios'

      loc.replace(base + '/?r=' + encodeURIComponent(rest + loc.search + loc.hash));
    })();
  </script>
</head>
<body></body>
</html>
